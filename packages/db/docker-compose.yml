name: journal-thingy

services:
  postgres:
    image: postgres:18
    container_name: journal-thingy-postgres
    environment:
      POSTGRES_DB: journal-thingy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - journal-thingy_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  journal-thingy_postgres_data:
